name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.1.0"
        required: true

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

  release:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set release metadata
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          fi
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build release archives
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist stage

          build_archive() {
            local goarch="$1"
            local asset_arch="$2"
            local archive="umbragate_Darwin_${asset_arch}.tar.gz"
            local root="stage/${asset_arch}"

            rm -rf "$root"
            mkdir -p "$root"

            CGO_ENABLED=0 GOOS=darwin GOARCH="$goarch" go build -trimpath -ldflags="-s -w" -o "$root/umbragate" .
            cp config.example.yaml "$root/config.example.yaml"
            tar -C "$root" -czf "dist/${archive}" umbragate config.example.yaml
          }

          build_archive arm64 arm64
          build_archive amd64 x86_64

          (cd dist && shasum -a 256 umbragate_Darwin_arm64.tar.gz umbragate_Darwin_x86_64.tar.gz > sha256sums.txt)

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          files: |
            dist/umbragate_Darwin_arm64.tar.gz
            dist/umbragate_Darwin_x86_64.tar.gz
            dist/sha256sums.txt

  update-homebrew-tap:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Check whether tap token is configured
        id: tap_token
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "configured=true" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        if: steps.tap_token.outputs.configured == 'true'
        with:
          repository: jachy-h/homebrew-umbragate
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Download release checksums
        if: steps.tap_token.outputs.configured == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release download "${{ needs.release.outputs.version }}" --repo jachy-h/umbra-gate --pattern sha256sums.txt --dir dist || gh release download "v${{ needs.release.outputs.version }}" --repo jachy-h/umbra-gate --pattern sha256sums.txt --dir dist

      - name: Update formula
        if: steps.tap_token.outputs.configured == 'true'
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          set -euo pipefail
          ARM_SHA=$(grep 'umbragate_Darwin_arm64.tar.gz' dist/sha256sums.txt | awk '{print $1}')
          AMD_SHA=$(grep 'umbragate_Darwin_x86_64.tar.gz' dist/sha256sums.txt | awk '{print $1}')
          FORMULA="tap/Formula/umbragate.rb"

          perl -0pi -e 's/version ".*?"/version "'"$VERSION"'"/' "$FORMULA"
          perl -0pi -e 's#url ".*/umbragate_Darwin_arm64.tar.gz"#url "https://github.com/jachy-h/umbra-gate/releases/download/v'"$VERSION"'/umbragate_Darwin_arm64.tar.gz"#' "$FORMULA"
          perl -0pi -e 's#url ".*/umbragate_Darwin_x86_64.tar.gz"#url "https://github.com/jachy-h/umbra-gate/releases/download/v'"$VERSION"'/umbragate_Darwin_x86_64.tar.gz"#' "$FORMULA"
          ruby -e '
            formula = File.read(ARGV[0])
            arm_sha = ARGV[1]
            amd_sha = ARGV[2]
            lines = formula.lines
            arm_index = lines.index { |line| line.include?("Darwin_arm64.tar.gz") }
            amd_index = lines.index { |line| line.include?("Darwin_x86_64.tar.gz") }
            raise "arm64 url line not found" unless arm_index
            raise "x86_64 url line not found" unless amd_index
            lines[arm_index + 1] = "      sha256 \"#{arm_sha}\"\n"
            lines[amd_index + 1] = "      sha256 \"#{amd_sha}\"\n"
            File.write(ARGV[0], lines.join)
          ' "$FORMULA" "$ARM_SHA" "$AMD_SHA"

      - name: Commit and push formula update
        if: steps.tap_token.outputs.configured == 'true'
        run: |
          set -euo pipefail
          cd tap
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/umbragate.rb
          git commit -m "chore: update umbragate v${{ needs.release.outputs.version }}"
          git push
