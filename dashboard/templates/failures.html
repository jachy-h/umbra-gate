{{define "content"}}
<div id="failuresApp">
    <h1 class="page-title">Failures</h1>

    <time-range-select v-model="range" label="Time Range" select-id="failureAnalyticsRange" aria-label="Failure analytics time range" @change="loadFailures"></time-range-select>

    <div class="stats overview-stats" id="failureSummary">
        <stat-card v-for="stat in stats" :key="stat.label" :icon="stat.icon" :label="stat.label" :value="stat.value"></stat-card>
        <div class="stat vue-fallback">
            <div class="icon">!</div><div><div class="label">Total Failures</div><div class="value" id="totalFailures">—</div></div>
        </div>
        <div class="stat vue-fallback">
            <div class="icon">#</div><div><div class="label">Categories</div><div class="value" id="totalCategories">—</div></div>
        </div>
        <div class="stat vue-fallback">
            <div class="icon">P</div><div><div class="label">Providers</div><div class="value" id="totalFailureProviders">—</div></div>
        </div>
        <div class="stat vue-fallback">
            <div class="icon">M</div><div><div class="label">Models</div><div class="value" id="totalFailureModels">—</div></div>
        </div>
    </div>

    <div class="dashboard-grid">
        <card-section title="Failure Categories">
            <usage-list id="failureCategories" :rows="categories" label-key="category" value-key="count" :state="error || state" empty-text="No failures."></usage-list>
            <div class="usage-list vue-fallback"><div class="empty-state">Loading...</div></div>
        </card-section>
        <card-section title="Failures by Provider">
            <usage-list id="failureProviders" :rows="providers" label-key="name" value-key="count" :state="error || state" empty-text="No failures."></usage-list>
            <div class="usage-list vue-fallback"><div class="empty-state">Loading...</div></div>
        </card-section>
        <card-section title="Failures by Model">
            <usage-list id="failureModels" :rows="models" label-key="name" value-key="count" :state="error || state" empty-text="No failures."></usage-list>
            <div class="usage-list vue-fallback"><div class="empty-state">Loading...</div></div>
        </card-section>
        <card-section title="Recent Failures">
            <recent-failures-table id="recentFailures" :rows="recent" empty-text="No recent failures."></recent-failures-table>
            <div class="vue-fallback"><div class="empty-state">Loading...</div></div>
        </card-section>
    </div>
</div>

<script type="module" src="/dashboard/static/dashboard/failures.js"></script>
{{end}}
