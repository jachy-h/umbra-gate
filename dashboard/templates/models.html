{{define "content"}}
<h1 style="margin-bottom:24px;font-size:24px;">Models</h1>

<div class="card">
    <table>
        <thead>
            <tr>
                <th>Model</th>
                <th>Requests</th>
                <th>Total Tokens</th>
                <th>Avg Duration</th>
            </tr>
        </thead>
        <tbody id="modelsBody">
            <tr><td colspan="4">Loading...</td></tr>
        </tbody>
    </table>
</div>

<script>
fetch('/api/models')
    .then(r => r.json())
    .then(data => {
        document.getElementById('modelsBody').innerHTML = data.map(m => `
            <tr>
                <td>${esc(m.model)}</td>
                <td>${m.request_count}</td>
                <td>${formatNum(m.total_tokens)}</td>
                <td>${(m.avg_duration_ms/1000).toFixed(1)}s</td>
            </tr>
        `).join('');
    });

function esc(s) { return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]); }
function formatNum(n) {
    if (n >= 1000000) return ((n / 1000000).toFixed(1) + 'M').replace('.0', '');
    if (n >= 1000) return ((n / 1000).toFixed(1) + 'K').replace('.0', '');
    return String(n);
}
</script>
{{end}}
