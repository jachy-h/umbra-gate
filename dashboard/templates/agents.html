{{define "content"}}
<div id="agentsApp">
    <h1 class="page-title">Agents</h1>

    <section class="card">
        <div class="agents-toolbar" v-if="statusMessage">
            <span :class="['agent-status-message', statusError ? 'error' : '']" v-text="statusMessage"></span>
        </div>
        <div v-if="loading" class="empty-state">Loading agents...</div>
        <div v-else-if="!agents.length" class="empty-state">No agents discovered.</div>
        <div v-else>
            <div class="agent-tabs" role="tablist" aria-label="Agent tabs">
                <button v-for="agent in agents" :key="agent.agent_id" type="button" role="tab" :class="{ active: agent.agent_id === activeAgentId }" @click="activeAgentId = agent.agent_id">
                    <span v-text="agent.display_name"></span>
                    <span :class="['agent-tab-dot', agentGatewayEnabled(agent) ? 'on' : '']"></span>
                </button>
            </div>
            <section v-if="activeAgent" class="agent-row">
                <div class="agent-row-header">
                    <div>
                        <h2 v-text="activeAgent.display_name"></h2>
                        <div class="agent-meta" v-text="activeAgent.agent_id + ' · ' + (activeAgent.fine_grained ? 'per-provider gateway' : 'single gateway target')"></div>
                    </div>
                    <span :class="['badge', agentGatewayEnabled(activeAgent) ? 'badge-success' : 'badge-pending']" v-text="agentGatewayEnabled(activeAgent) ? 'Gateway On' : 'Gateway Off'"></span>
                </div>
                <div class="config-path" v-if="selectedConfig(activeAgent)" v-text="selectedConfig(activeAgent)"></div>
                <table>
                    <thead><tr><th>Provider</th><th>Live URL</th><th>Gateway URL</th><th>Status</th><th></th></tr></thead>
                    <tbody>
                        <tr v-if="!activeAgent.bindings.length"><td colspan="5">No provider bindings.</td></tr>
                        <tr v-for="binding in activeAgent.bindings" :key="activeAgent.agent_id + ':' + binding.provider_id">
                            <td v-text="binding.provider_id"></td>
                            <td><code v-text="binding.live_base_url || 'not configured'"></code></td>
                            <td><code v-text="binding.gateway_base_url"></code></td>
                            <td><span :class="['badge', binding.gateway_enabled ? 'badge-success' : 'badge-pending']" v-text="binding.gateway_enabled ? 'On' : 'Off'"></span></td>
                            <td>
                                <button type="button" class="secondary" :disabled="binding.updating" @click="toggle(activeAgent, binding)">
                                    <span v-text="binding.gateway_enabled ? 'Disable' : 'Enable'"></span>
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </div>
    </section>
</div>

<style>
.agents-toolbar { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
.agent-status-message { color:#0d7d44; font-size:13px; }
.agent-status-message.error { color:#c53030; }
.agent-tabs { display:flex; gap:8px; border-bottom:1px solid #e5e7eb; margin-bottom:16px; overflow:auto; }
.agent-tabs button { width:auto; margin:0; border:0; border-bottom:2px solid transparent; border-radius:0; background:transparent; color:#6b7280; padding:10px 12px; display:inline-flex; align-items:center; gap:8px; white-space:nowrap; }
.agent-tabs button.active { color:#111827; border-bottom-color:#4f46e5; font-weight:700; }
.agent-tab-dot { width:8px; height:8px; border-radius:999px; background:#d1d5db; }
.agent-tab-dot.on { background:#10a37f; }
.agent-row { border:1px solid #e5e7eb; border-radius:8px; padding:16px; background:#fff; }
.agent-row-header { display:flex; justify-content:space-between; gap:12px; align-items:flex-start; margin-bottom:12px; }
.agent-row h2 { margin:0 0 4px; font-size:18px; color:#111827; }
.agent-meta { color:#6b7280; font-size:13px; }
.agent-row table { margin-top:12px; }
.agent-row button.secondary { width:auto; padding:7px 10px; margin:0; font-size:13px; }
</style>
<script type="module" src="/dashboard/static/dashboard/agents.js"></script>
{{end}}
