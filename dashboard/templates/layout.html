<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Umbragate</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="/dashboard/static/dashboard/styles.css">
    <script type="module" src="/dashboard/static/dashboard/header.js"></script>
</head>
<body>
    <div id="appHeader" data-active="{{.Active}}">
        <nav>
            <a class="brand" href="/dashboard"><span class="brand-mark">U</span><span>Umbragate</span></a>
            <a href="/dashboard" class="{{if eq .Active "home"}}active{{end}}">Overview</a>
            <a href="/dashboard/agents" class="{{if eq .Active "agents"}}active{{end}}">Agents</a>
            <a href="/dashboard/providers" class="{{if eq .Active "providers"}}active{{end}}">Providers</a>
            <a href="/dashboard/models" class="{{if eq .Active "models"}}active{{end}}">Models</a>
            <a href="/dashboard/analytics" class="{{if eq .Active "analytics"}}active{{end}}">Analytics</a>
            <a href="/dashboard/failures" class="{{if eq .Active "failures"}}active{{end}}">Failures</a>
            <a href="/dashboard/sessions" class="{{if eq .Active "sessions"}}active{{end}}" data-i18n="sessions">Sessions</a>
            <span class="nav-spacer"></span>
            <button id="languageToggle" class="lang-toggle" type="button">中文</button>
        </nav>
    </div>
    <main>
        {{block "content" .}}{{end}}
    </main>
</body>
</html>
