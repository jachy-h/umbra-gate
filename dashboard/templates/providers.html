{{define "content"}}
<div id="providersApp">
    <h1 class="page-title">Providers</h1>

    <div class="provider-layout">
        <section class="card">
            <div class="provider-header">
                <h2>Provider Analytics</h2>
                <select id="providerAnalyticsRange" v-model="range" @change="loadProviderAnalytics" aria-label="Provider analytics time range">
                    <option value="24h">24h</option>
                    <option value="7d">7d</option>
                    <option value="30d">30d</option>
                    <option value="90d">90d</option>
                </select>
            </div>
            <div class="provider-charts">
                <div class="provider-chart"><canvas id="providerTokenChart"></canvas></div>
                <div class="provider-chart"><canvas id="providerSuccessChart"></canvas></div>
            </div>
            <provider-analytics-rows id="providerAnalyticsContainer" :rows="analyticsRows"></provider-analytics-rows>
            <div class="vue-fallback" id="providerAnalyticsFallback"><div class="empty-state">Loading...</div></div>
        </section>

        <section class="card">
            <div class="provider-header">
                <h2>Gateway Providers</h2>
                <button type="button" @click="newProvider">New Provider</button>
            </div>
            <div v-if="providerRows === null" class="empty-state">Loading providers...</div>
            <table v-else>
                <thead><tr><th>ID</th><th>Base URL</th><th>Key</th><th></th></tr></thead>
                <tbody>
                    <tr v-if="!providerRows.length"><td colspan="4">No gateway providers configured.</td></tr>
                    <tr v-for="provider in providerRows" :key="provider.id">
                        <td><strong v-text="provider.id"></strong></td>
                        <td><code v-text="provider.base_url"></code></td>
                        <td><span :class="['badge', provider.has_api_key ? 'badge-success' : 'badge-pending']" v-text="provider.has_api_key ? 'configured' : 'passthrough'"></span></td>
                        <td class="provider-actions">
                            <button type="button" class="secondary" @click="editProvider(provider)">Edit</button>
                            <button type="button" class="secondary danger" @click="deleteProvider(provider)">Delete</button>
                        </td>
                    </tr>
                </tbody>
            </table>
            <form class="provider-form" @submit.prevent="saveProvider">
                <h3 v-text="editingExisting ? 'Edit Provider' : 'New Provider'"></h3>
                <div class="provider-form-grid">
                    <label>ID<input v-model.trim="form.id" :disabled="editingExisting" required></label>
                    <label>Base URL<input v-model.trim="form.base_url" placeholder="https://api.example.com" required></label>
                    <label>API Key / Env Ref<input v-model="form.api_key" placeholder="${PROVIDER_API_KEY}"></label>
                </div>
                <div class="provider-form-actions">
                    <button type="submit" :aria-busy="saving">Save</button>
                    <button type="button" class="secondary" @click="resetForm">Cancel</button>
                    <span :class="['provider-status', statusError ? 'error' : '']" v-if="status" v-text="status"></span>
                </div>
            </form>
        </section>
    </div>
</div>

<style>
.provider-layout { display:grid; grid-template-columns:1fr; gap:16px; }
.provider-header { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:16px; }
.provider-header h2 { margin:0; }
.provider-header select, .provider-header button { width:auto; margin:0; }
.provider-charts { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:18px; }
.provider-chart { height:260px; min-height:260px; position:relative; }
.provider-chart canvas { width:100% !important; height:100% !important; }
.provider-actions { display:flex; gap:8px; justify-content:flex-end; }
.provider-actions button, .provider-form-actions button { width:auto; margin:0; padding:7px 10px; font-size:13px; }
.provider-actions .danger { color:#c53030; border-color:#fecaca; }
.provider-form { margin-top:18px; padding-top:16px; border-top:1px solid #eef2f7; }
.provider-form h3 { font-size:16px; margin:0 0 12px; color:#111827; }
.provider-form-grid { display:grid; grid-template-columns:repeat(2, minmax(0, 1fr)); gap:12px; }
.provider-form label { font-size:13px; color:#4b5563; margin:0; }
.provider-form input, .provider-form select { margin-top:6px; }
.provider-form-actions { display:flex; align-items:center; gap:10px; margin-top:12px; }
.provider-status { color:#0d7d44; font-size:13px; }
.provider-status.error { color:#c53030; }
@media (max-width: 760px) { .provider-charts, .provider-form-grid { grid-template-columns:1fr; } .provider-actions { justify-content:flex-start; } }
.provider-analytics-grid { display:grid; gap:10px; }
.provider-analytics-row { display:grid; grid-template-columns:minmax(140px,1fr) repeat(5, minmax(82px, auto)); gap:12px; align-items:center; padding:12px 14px; border:1px solid #f3f4f6; border-radius:10px; background:#fafafa; }
.provider-analytics-name { font-weight:700; color:#111827; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.provider-analytics-metric { text-align:right; }
.provider-analytics-label { color:#9ca3af; font-size:10px; text-transform:uppercase; letter-spacing:0.4px; }
.provider-analytics-value { color:#111827; font-weight:750; font-size:13px; margin-top:2px; }
@media (max-width: 760px) { .provider-analytics-row { grid-template-columns:1fr 1fr; } .provider-analytics-metric { text-align:left; } }
</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module" src="/dashboard/static/dashboard/providers.js"></script>
{{end}}
