{{define "content"}}
<div id="providersApp">
    <h1 class="page-title">Providers</h1>

    <div class="provider-layout">
        <div class="card">
            <div class="provider-analytics-header">
                <h2>Provider Analytics</h2>
                <select id="providerAnalyticsRange" v-model="range" @change="loadProviderAnalytics" aria-label="Provider analytics time range">
                    <option value="24h">24h</option>
                    <option value="7d">7d</option>
                    <option value="30d">30d</option>
                    <option value="90d">90d</option>
                </select>
            </div>
            <div class="provider-charts">
                <div class="provider-chart"><canvas id="providerTokenChart"></canvas></div>
                <div class="provider-chart"><canvas id="providerSuccessChart"></canvas></div>
            </div>
            <provider-analytics-rows id="providerAnalyticsContainer" :rows="analyticsRows"></provider-analytics-rows>
            <div class="vue-fallback" id="providerAnalyticsFallback"><div class="empty-state">Loading...</div></div>
        </div>

        <div class="card">
            <div class="provider-analytics-header">
                <h2>Management</h2>
                <span class="empty-state" style="padding:0;font-size:13px;">Toggle gateway forwarding per provider</span>
            </div>
            <provider-management-table id="providerTableContainer" :rows="providerRows" :config-path="configPath" @toggle="onToggle"></provider-management-table>
            <div class="vue-fallback"><div class="empty-state">Loading...</div></div>
            <div id="globalStatus" class="empty-state" :style="{ minHeight: '20px', marginTop: '8px', color: statusError ? '#c53030' : '#0d7d44' }">{{`{{ status }}`}}</div>
        </div>
    </div>
</div>

<style>
.gw-cell { display:flex; align-items:center; gap:10px; }
.gw-cell label { margin:0; padding:0; display:inline-flex; align-items:center; }
.gw-cell input[type="checkbox"][role="switch"] { margin:0; --pico-line-height:1; }
.gw-status { font-size:13px; color:#6b7280; min-width:70px; }
.gw-status.on { color:#0d7d44; font-weight:600; }
.config-path { font-family: ui-monospace, Menlo, monospace; font-size:11px; color:#6b7280; padding:6px 10px; background:#f9fafb; border-radius:4px; display:inline-block; margin-bottom:12px; }
.row-source { font-size:11px; color:#6b7280; text-transform:uppercase; letter-spacing:0.5px; margin-left:8px; }
.gw-cell input[type="checkbox"][role="switch"]:checked { --pico-color: #4f46e5; --pico-background-color: #4f46e5; --pico-border-color: #4f46e5; }
.provider-analytics-header { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:16px; }
.provider-analytics-header h2 { margin:0; }
.provider-analytics-header select { width:auto; min-width:120px; margin:0; }
.provider-layout { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.provider-charts { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:18px; }
.provider-chart { height:260px; min-height:260px; position:relative; }
.provider-chart canvas { width:100% !important; height:100% !important; }
@media (max-width: 900px) { .provider-layout { grid-template-columns:1fr; } .provider-charts { grid-template-columns:1fr; } }
.provider-analytics-grid { display:grid; gap:10px; }
.provider-analytics-row { display:grid; grid-template-columns:minmax(140px,1fr) repeat(5, minmax(82px, auto)); gap:12px; align-items:center; padding:12px 14px; border:1px solid #f3f4f6; border-radius:10px; background:#fafafa; }
.provider-analytics-name { font-weight:700; color:#111827; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.provider-analytics-metric { text-align:right; }
.provider-analytics-label { color:#9ca3af; font-size:10px; text-transform:uppercase; letter-spacing:0.4px; }
.provider-analytics-value { color:#111827; font-weight:750; font-size:13px; margin-top:2px; }
@media (max-width: 760px) { .provider-analytics-row { grid-template-columns:1fr 1fr; } .provider-analytics-metric { text-align:left; } }
</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module" src="/dashboard/static/dashboard/providers.js"></script>
{{end}}
